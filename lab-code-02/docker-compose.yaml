  #   depends_on:
  #     - ollama
  #     - opensearch
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped

  # --- DOCUMENT PARSING (Docling) ---
  docling-serve:
    image: quay.io/ds4sd/docling-serve-gpu:latest
    container_name: docling-serve
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
